---
$schema: "file://../../../.moon/cache/schemas/project.json"

language: rust
layer: library

tasks:
  build:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      cargo build --release --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "src/**/*.rs"
      - ".cargo/config.toml"
    outputs:
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"

  check:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      cargo check --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "src/**/*.rs"
      - ".cargo/config.toml"

  typecheck:
    deps:
      - "~:check"
    command: "noop"

  test:
    script: |
      set -euo pipefail
      host_target="$(rustc -vV | awk '/^host:/ {print $2}')"
      cargo test --target "$host_target"
    inputs:
      - "Cargo.toml"
      - "src/**/*.rs"
      - ".cargo/config.toml"

  dev:
    deps:
      - "~:build"
      - "pi-extension:dev"
    inputs:
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"
    script: |
      set -euo pipefail
      plugin_path="$HOME/.config/zellij/plugins/zellij-plugin-agent-threads.wasm"

      mkdir -p "$(dirname "$plugin_path")"
      ln -sfn "$PWD/target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm" "$plugin_path"

      zellij action start-or-reload-plugin "file:$plugin_path"
    options:
      runInCI: false

  dev-watch:
    script: |
      set -euo pipefail
      watchexec \
        --restart \
        --watch Cargo.toml \
        --watch .cargo/config.toml \
        --watch src \
        --exts rs,toml \
        -- moon run zellij-plugin:dev --force
    options:
      persistent: true
      runInCI: false

  #TODO: add a publish task here that builds the wasm and uploads it to the release
