---
$schema: "file://../../../.moon/cache/schemas/project.json"

language: rust
layer: library

tasks:
  build:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      cargo build --release --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "template/**/*.jinja"
      - ".cargo/config.toml"
    outputs:
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"

  check:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      cargo check --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "template/**/*.jinja"
      - ".cargo/config.toml"

  typecheck:
    deps:
      - "~:check"
    command: "noop"

  test:
    script: |
      set -euo pipefail
      host_target="$(rustc -vV | awk '/^host:/ {print $2}')"
      cargo test --target "$host_target"
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "template/**/*.jinja"
      - ".cargo/config.toml"

  demo:
    type: run
    deps:
      - "~:build"
    script: |
      set -euo pipefail
      echo "Starting Zellij demo session with zellij-agent-threads plugin"
      command -v zellij >/dev/null || { echo "zellij is required" >&2; exit 1; }
      command -v ghostty >/dev/null || { echo "ghostty is required" >&2; exit 1; }
      layout_path="$PWD/demo.kdl"
      ghostty "+new-window" -e env \
        zellij \
          --new-session-with-layout "$layout_path"
    inputs:
      - "demo.kdl"
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"
    options:
      cache: false
      interactive: true
      runInCI: false

  install:
    deps:
      - "~:build"
      - "pi-extension:install"
    inputs:
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"
    script: |
      set -euo pipefail
      plugin_path="$HOME/.config/zellij/plugins/zellij-agent-threads.wasm"
      mkdir -p "$(dirname "$plugin_path")"
      ls -al ./target/wasm32-wasip1/release
      cp "./target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm" "$plugin_path"

      zellij action start-or-reload-plugin "file:$plugin_path"
    options:
      cache: false
      runInCI: false

  dev-watch:
    script: |
      set -euo pipefail
      watchexec \
        --restart \
        --watch Cargo.toml \
        --watch build.rs \
        --watch .cargo/config.toml \
        --watch src \
        --watch template \
        --exts rs,toml,jinja \
        -- moon run zellij-plugin:install --force
    options:
      persistent: true
      runInCI: false

  publish:
    type: run
    deps:
      - "~:build"
    inputs:
      - "target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"
    options:
      cache: false
      runInCI: true
    script: |
      set -euo pipefail

      wasm_path="$PWD/target/wasm32-wasip1/release/zellij-plugin-agent-threads.wasm"
      asset_name="zellij-plugin-agent-threads.wasm"
      repo="${GITHUB_REPOSITORY:?GITHUB_REPOSITORY is required}"
      tag="${PUBLISH_RELEASE_TAG:?PUBLISH_RELEASE_TAG is required}"

      test -f "$wasm_path"
      gh release view "$tag" --repo "$repo" >/dev/null
      gh release upload "$tag" "$wasm_path#$asset_name" --repo "$repo" --clobber
