[package]
name = "zellij-plugin-agent-threads"
version = "0.1.0"
edition = "2021"
description = "Zellij plugin that lists Pi agent sessions"
license = "MIT"

[dependencies]
zellij-tile = "=0.44.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
minijinja = "2.21"
minijinja-embed = "2.21"
zellij-template-render = { git = "https://github.com/zenobi-us/zellij-plugins", rev = "7156a80fab6f1340a3d6906f9bacfa228f0cfd1a" }

[build-dependencies]
minijinja-embed = "2.21"
