# yaml-language-server: $schema=../../../.moon/cache/schemas/project.json
language: bash
layer: tool

project:
  name: deployment

tasks:
  test:
    script: |
      bash -n deploy-github-pages resolve-publish-metadata npm-publish
      bats *.bats
    inputs:
      - "deploy-github-pages"
      - "resolve-publish-metadata"
      - "*.bats"
      - "npm-publish"
