---
$schema: "file://../../.moon/cache/schemas/project.json"

language: typescript
layer: application

toolchains:
  default: ["javascript", "bun"]

tasks:
  dev:
    command: "waku dev --port ${PORT:-3000}"
    options:
      runInCI: false

  build:
    dependsOn: ["generate-version-manifest"]
    command: waku build
    inputs:
      - "content/**/*"
      - "public/**/*"
      - "package.json"
      - "press.config.tsx"
      - "source.config.ts"
      - "tsconfig.json"
      - "waku.config.ts"
    outputs:
      - "dist/public"

  generate-version-manifest:
    command: "bash .moon/tasks/generate-version-manifest"
    inputs:
      - "/.release-please-manifest.json"
      - "/apps/*/package.json"
      - "/pkgs/**/package.json"
    outputs:
      - "public/releases.json"

  upload-version-manifest:
    dependsOn: ["generate-version-manifest"]
    command: "bash .moon/tasks/upload-version-manifest"
    options:
      cache: false

  mdxcheck:
    command: fumadocs-mdx
    inputs:
      - "content/**/*"
      - "public/**/*"
      - "package.json"
      - "press.config.tsx"
      - "source.config.ts"
      - "tsconfig.json"
      - "waku.config.ts"

  typecheck:
    command: tsc --noEmit
    inputs:
      - "package.json"
      - "press.config.tsx"
      - "source.config.ts"
      - "tsconfig.json"
      - "waku.config.ts"

  test:
    command: "bun test"

  serve:
    dependsOn: ["build"]
    command: "bunx serve ./dist/public"
    options:
      runInCI: false

  publish:
    type: run
    dependsOn: ["build"]
    options:
      cache: false
    command: "${MOON_WORKSPACE_ROOT}/pkgs/tools/deployment/deploy-github-pages --source ${MOON_PROJECT_ROOT}/dist/public --repo zellij-agent-threads.github.io --description 'Zellij Agent Threads documentation site'"
