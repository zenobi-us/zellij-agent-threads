name: Release

on:
  push:
    branches: [main, release/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      publish_matrix: ${{ steps.publish-matrix.outputs.publish_matrix || '[]' }}
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: DetermineBranchOwnership
        id: ownership
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main" "+refs/heads/release/*:refs/remotes/origin/release/*"
          ownership="$(.github/tasks/get-release-ownership "${GITHUB_REF_NAME}" "${GITHUB_SHA}" "${GITHUB_REPOSITORY}")"
          process="$(jq -r '.process' <<<"${ownership}")"
          reason="$(jq -r '.reason' <<<"${ownership}")"
          echo "process=${process}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "Branch ownership: ${reason}" >> "${GITHUB_STEP_SUMMARY}"

      - name: SetupToolchain
        if: steps.ownership.outputs.process == 'true'
        uses: moonrepo/setup-toolchain@8794f0318b9df4a43a5ddc23cefd16f595b423dd # v0
        with:
          auto-install: true
          auto-setup: true

      - name: RestoreMoonCache
        if: steps.ownership.outputs.process == 'true'
        uses: ./.github/actions/moon-cache
        with:
          key-prefix: moon-release
          cache-version: v1

      - name: PrepareReleasePleaseMode
        if: steps.ownership.outputs.process == 'true'
        id: mode
        run: |
          set -euo pipefail
          mode="$(.github/tasks/get-release-mode "${GITHUB_REF_NAME}")"
          case "${mode}" in
            hotfix) config_file="release-please-config--hotfix.json" ;;
            normal) config_file="release-please-config--release.json" ;;
            *) echo "Unsupported release mode: ${mode}" >&2; exit 1 ;;
          esac
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "config_file=${config_file}" >> "${GITHUB_OUTPUT}"

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        if: steps.ownership.outputs.process == 'true'
        id: release-please
        name: RunReleasePlease
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ steps.mode.outputs.config_file }}
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}
          skip-github-pull-request: false

      - name: SummaryReleasePleaseOutputs
        if: steps.ownership.outputs.process == 'true'
        run: |
          cat <<'EOF' | ./.github/tasks/summarise-release-please.sh
          ${{ toJson(steps.release-please.outputs) }}
          EOF
        env:
          RP_MODE: ${{ steps.mode.outputs.mode }}
          RP_CONFIG_FILE: ${{ steps.mode.outputs.config_file }}

      - id: channel
        if: steps.ownership.outputs.process == 'true'
        name: ResolvePublishChannel
        env:
          RELEASES_CREATED: ${{ steps.release-please.outputs.releases_created }}
        run: |
          if [[ "${RELEASES_CREATED,,}" == true ]]; then
            echo "channel=latest" >> "${GITHUB_OUTPUT}"
          else
            echo "channel=next" >> "${GITHUB_OUTPUT}"
          fi

      - id: publish-matrix
        if: steps.ownership.outputs.process == 'true'
        name: GeneratePublishMatrix
        run: |
          set -euo pipefail
          payload_file="$(mktemp)"
          trap 'rm -f "${payload_file}"' EXIT
          cat >"${payload_file}" <<'EOF'
          ${{ toJson(steps.release-please.outputs) }}
          EOF
          base_ref='${{ github.event.before }}'
          head_ref='${{ github.sha }}'
          if [[ -z "${base_ref}" || "${base_ref}" == 0000000000000000000000000000000000000000 ]]; then
            base_ref="$(git rev-parse HEAD^ 2>/dev/null || printf '%s' "${head_ref}")"
          fi
          publish_matrix="$(.github/tasks/get-publish-matrix "@${payload_file}" "${base_ref}" "${head_ref}" | jq -rc '.')"
          echo "publish_matrix=${publish_matrix}" >> "${GITHUB_OUTPUT}"
          echo "${publish_matrix}" | jq -r '.[] | "- target: `\(.target)`"' >> "${GITHUB_STEP_SUMMARY}"

  publish:
    needs: process
    if: needs.process.outputs.publish_matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.process.outputs.publish_matrix) }}
    steps:
      - name: DispatchPublish-${{ matrix.target }}-${{ needs.process.outputs.channel }}
        uses: peter-evans/repository-dispatch@bf47d102fdb849e755b0b0023ea3e81a44b6f570 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: publish-package
          client-payload: >-
            {"target":"${{ matrix.target }}","channel":"${{ needs.process.outputs.channel }}","source_sha":"${{ github.sha }}","source_branch":"${{ github.ref_name }}"}
